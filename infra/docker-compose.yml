version: "3.9"

services:
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "32888:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      - CORS_ORIGIN=http://localhost:32888
      - DB_PATH=/data/gridfinity.db
      - IMAGE_DIR=/data/images
      - LOG_LEVEL=info
      - SHADOWBOX_SIDECAR_URL=http://shadowbox-sidecar:5001
      - SHADOWBOX_STL_DIR=/data/shadowboxes
    volumes:
      - gridfinity-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  shadowbox-sidecar:
    build: ../shadowbox-sidecar
    restart: unless-stopped
    environment:
      - OPENSCAD_PATH=/usr/local/bin/openscad
      - GRIDFINITY_LIB_PATH=/opt/gridfinity-rebuilt-openscad
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gridfinity-data:
    driver: local
